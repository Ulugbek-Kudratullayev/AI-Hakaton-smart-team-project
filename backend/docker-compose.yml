services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fleet_ai
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://fleet_user:fleet_pass@db:5432/fleet_ai
      SECRET_KEY: demo-secret-key
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
